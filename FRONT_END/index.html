<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080c14"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Safe Space — Your AI-powered mental well-being companion.">
    <title>Safe Space</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="/icon/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icon/icon-192x192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #080c14;
            --surface: rgba(14, 20, 36, 0.85);
            --surface-2: rgba(22, 30, 52, 0.7);
            --border: rgba(120, 160, 255, 0.1);
            --border-glow: rgba(120, 160, 255, 0.25);
            --text-1: #e8edf8;
            --text-2: #8a96b4;
            --text-3: #4d5775;
            --accent: #6c8fff;
            --accent-2: #a78bfa;
            --teal: #2dd4bf;
            --teal-dim: rgba(45, 212, 191, 0.15);
            --violet: #7c6ef7;
            --violet-dim: rgba(124, 110, 247, 0.15);
            --red: #f87171;
            --green: #34d399;
            --r: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            height: 100%;
            height: 100dvh;
            overscroll-behavior: none;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ─── AMBIENT BACKGROUND ─── */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.18;
            will-change: transform;
        }
        .orb-1 {
            width: 70vmax; height: 70vmax;
            background: radial-gradient(circle, #4f46e5, transparent 60%);
            top: -30%; left: -25%;
            animation: drift1 28s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 55vmax; height: 55vmax;
            background: radial-gradient(circle, #0d9488, transparent 60%);
            bottom: -25%; right: -20%;
            animation: drift2 34s ease-in-out infinite alternate;
        }
        .orb-3 {
            width: 40vmax; height: 40vmax;
            background: radial-gradient(circle, #7c3aed, transparent 60%);
            top: 40%; left: 50%;
            animation: drift3 22s ease-in-out infinite alternate;
            opacity: 0.1;
        }
        @keyframes drift1 { to { transform: translate(12%, 18%) scale(1.1); } }
        @keyframes drift2 { to { transform: translate(-14%, -10%) scale(0.9); } }
        @keyframes drift3 { to { transform: translate(8%, -15%) scale(1.2); } }

        /* Noise grain */
        .bg-canvas::after {
            content: '';
            position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.35;
        }

        /* ─── LAYOUT ─── */
        #app {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100%; height: 100dvh;
            overflow: hidden;
        }

        /* ─── TOP BAR ─── */
        #top-bar {
            flex-shrink: 0;
            padding: 14px 20px 10px;
            padding-top: max(14px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s, transform 0.5s;
        }
        #top-bar.visible { opacity: 1; transform: translateY(0); }

        .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, var(--accent-2), var(--teal));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* ─── JOURNEY STEPPER ─── */
        #stepper {
            display: flex; align-items: center; gap: 6px;
        }
        .step-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-3);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .step-dot.done { background: var(--teal); width: 8px; }
        .step-dot.current {
            background: var(--accent);
            width: 24px; border-radius: 4px;
            box-shadow: 0 0 10px var(--accent);
        }

        /* ─── MAIN SCROLL AREA ─── */
        #main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 16px 24px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
        }
        #main::-webkit-scrollbar { display: none; }

        /* ─── SCREENS ─── */
        .screen {
            display: none;
            width: 100%;
            max-width: 1100px;   /* was 480px */
            flex-direction: column;
            align-items: center;
            animation: screenIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }       
        .screen.active { display: flex; }
        @keyframes screenIn {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── CARDS ─── */
        .card {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
        }
        .card-body { padding: 24px; }
        .card + .card { margin-top: 12px; }

        /* ─── BUTTONS ─── */
        .btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 14px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s;
            position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.97) !important; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, var(--violet) 0%, var(--accent) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(108, 143, 255, 0.35);
        }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(108, 143, 255, 0.5); transform: translateY(-1px); }

        .btn-teal {
            background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(20, 184, 166, 0.3);
        }
        .btn-teal:hover:not(:disabled) { transform: translateY(-1px); }

        .btn-ghost {
            background: var(--surface-2);
            color: var(--text-2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) { border-color: var(--border-glow); color: var(--text-1); }

        .btn + .btn { margin-top: 10px; }

        /* ─── WELCOME SCREEN ─── */
        #screen-welcome {
            min-height: calc(100dvh - 60px);
            justify-content: center;
            text-align: center;
            gap: 0;
        }
        .welcome-hero {
            position: relative;
            width: 140px; height: 140px;
            margin: 0 auto 28px;
        }
        .hero-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid var(--border-glow);
            animation: spin 20s linear infinite;
        }
        .hero-ring::before {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            background: var(--teal);
            border-radius: 50%;
            top: -4px; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 12px var(--teal);
        }
        .hero-ring-2 {
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            border: 1px solid var(--border);
            animation: spin 14s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hero-core {
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--violet-dim), var(--teal-dim));
            border: 1px solid var(--border-glow);
            display: flex; align-items: center; justify-content: center;
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .hero-core svg { width: 36px; height: 36px; color: var(--accent-2); fill: currentColor; }

        .welcome-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 7vw, 2.8rem);
            line-height: 1.15;
            background: linear-gradient(135deg, var(--text-1) 30%, var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .welcome-sub {
            color: var(--text-2);
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 36px;
        }
        .welcome-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
            width: 100%;
            max-width: 380px;
        }
        .feature-pill {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.82rem;
            color: var(--text-2);
        }
        .feature-pill span:first-child { font-size: 1.2rem; }

        /* ─── STEP TEMPLATE ─── */
        .step-header {
            width: 100%;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
        }
        .ai-avatar {
            flex-shrink: 0;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--violet-dim), var(--teal-dim));
            border: 1px solid var(--border-glow);
            display: flex; align-items: center; justify-content: center;
            animation: float 5s ease-in-out infinite;
        }
        .ai-avatar svg { width: 20px; height: 20px; color: var(--accent-2); fill: currentColor; }

        .bubble {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            padding: 12px 16px;
            font-size: 0.9rem;
            line-height: 1.55;
            color: var(--text-1);
        }

        /* ─── SENSOR STEP ─── */
        .radar-wrap {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .radar-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1.5px solid rgba(45,212,191,0.3);
            animation: radarPulse 2s ease-out infinite;
        }
        .radar-ring:nth-child(1) { width: 40px; height: 40px; animation-delay: 0s; }
        .radar-ring:nth-child(2) { width: 72px; height: 72px; animation-delay: 0.5s; }
        .radar-ring:nth-child(3) { width: 110px; height: 110px; animation-delay: 1s; }
        @keyframes radarPulse {
            0% { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
        }
        .radar-core {
            position: relative; z-index: 1;
            width: 52px; height: 52px;
            background: var(--teal-dim);
            border-radius: 50%;
            border: 1px solid rgba(45,212,191,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .radar-core svg { width: 24px; height: 24px; color: var(--teal); stroke: currentColor; fill: none; }

        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
        }
        .sensor-tile {
            background: rgba(8, 12, 20, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
        }
        .sensor-tile .label { font-size: 0.7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
        .sensor-tile .value { font-size: 1.05rem; font-weight: 600; color: var(--text-1); }
        .sensor-tile .unit { font-size: 0.65rem; color: var(--text-2); }

        /* ─── PHOTO STEP ─── */
        .camera-frame {
            width: 100%;
            aspect-ratio: 4/3;
            background: rgba(8, 12, 20, 0.7);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            position: relative;
            transition: border-color 0.3s;
        }
        .camera-frame:hover { border-color: var(--border-glow); }
        .camera-frame video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .camera-frame.streaming video { display: block; }
        .camera-placeholder {
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            color: var(--text-3); pointer-events: none;
        }
        .camera-placeholder svg { width: 48px; height: 48px; stroke: currentColor; fill: none; }
        .camera-placeholder span { font-size: 0.85rem; }
        .camera-frame.streaming .camera-placeholder { display: none; }

        /* corner brackets */
        .camera-frame::before, .camera-frame::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--teal);
            border-style: solid;
            opacity: 0.6;
        }
        .camera-frame::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .camera-frame::after { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        .status-line {
            font-size: 0.82rem;
            color: var(--teal);
            text-align: center;
            min-height: 20px;
            margin-top: 10px;
        }

        /* ─── AUDIO STEP ─── */
        .mic-btn {
            width: 88px; height: 88px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin: 8px auto 16px;
        }
        .mic-btn:hover { border-color: var(--border-glow); transform: scale(1.05); }
        .mic-btn.recording {
            background: rgba(248, 113, 113, 0.15);
            border-color: var(--red);
            box-shadow: 0 0 0 0 rgba(248,113,113,0.4);
            animation: pulse-ring 1.5s ease-out infinite;
        }
        .mic-btn svg { width: 36px; height: 36px; stroke: var(--text-2); fill: none; transition: stroke 0.3s; }
        .mic-btn.recording svg { stroke: var(--red); }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
            70% { box-shadow: 0 0 0 20px rgba(248,113,113,0); }
            100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
        }

        /* ─── DASS STEP ─── */
        .dass-progress-track {
            width: 100%;
            height: 3px;
            background: var(--surface-2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .dass-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--violet), var(--accent));
            border-radius: 3px;
            transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .dass-counter {
            font-size: 0.75rem;
            color: var(--text-3);
            text-align: right;
            margin-bottom: 20px;
        }
        .dass-question {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            color: var(--text-1);
            text-align: center;
            line-height: 1.5;
            min-height: 72px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 22px;
        }
        .dass-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .dass-opt {
            padding: 14px 10px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
        }
        .dass-opt:hover { border-color: var(--border-glow); color: var(--text-1); transform: scale(1.02); }
        .dass-opt.selected {
            background: var(--violet-dim);
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.04);
            box-shadow: 0 0 16px rgba(108,143,255,0.2);
        }
        .dass-nav {
            display: flex; gap: 10px; width: 100%;
        }
        .dass-nav .btn { flex: 1; }

        /* ─── REVEAL STEP ─── */
        .reveal-wrap {
            display: flex; flex-direction: column;
            align-items: center; gap: 14px;
            padding: 8px 0;
        }
        .reveal-btn {
            position: relative;
            width: 140px; height: 140px;
            cursor: pointer;
            user-select: none; -webkit-user-select: none;
        }
        .reveal-btn svg { width: 100%; height: 100%; overflow: visible; }
        .reveal-label {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: var(--text-1);
            pointer-events: none;
        }
        .reveal-hint {
            font-size: 0.78rem;
            color: var(--text-3);
            text-align: center;
        }

        /* ─── ANALYZING STEP ─── */
        .breathe-wrap {
            position: relative;
            width: 200px; height: 200px;
            margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
        }
        .breathe-ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(45,212,191,0.2);
            animation: breatheIn 8s ease-in-out infinite;
        }
        .breathe-ring:nth-child(2) { animation-delay: -2s; opacity: 0.6; }
        .breathe-ring:nth-child(3) { animation-delay: -4s; opacity: 0.35; }
        @keyframes breatheIn {
            0%,100% { transform: scale(0.6); opacity: 0.1; }
            50% { transform: scale(1); opacity: 0.4; }
        }
        .breathe-text {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: var(--text-2);
            position: relative; z-index: 1;
            transition: opacity 0.8s ease;
        }

        /* ─── REPORT SCREEN ─── */
        #screen-report {
            gap: 14px;
            padding-bottom: 8px;
        }
        .report-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.6rem, 5vw, 2rem);
            text-align: center;
            background: linear-gradient(135deg, var(--text-1), var(--accent-2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .report-sub {
            font-size: 0.82rem;
            color: var(--text-3);
            text-align: center;
        }

        /* Gauge */
        .gauge-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        .gauge-wrap {
            position: relative;
            width: 140px; height: 140px;
        }
        .gauge-wrap svg { width: 100%; height: 100%; }
        .gauge-center {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .gauge-score {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }
        .gauge-label {
            font-size: 0.72rem;
            margin-top: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .gauge-title {
            font-size: 0.78rem;
            color: var(--text-3);
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        /* Transcript */
        .transcript-card .card-body {
            display: flex; gap: 12px; align-items: flex-start;
        }
        .transcript-icon {
            flex-shrink: 0;
            width: 32px; height: 32px;
            border-radius: 10px;
            background: var(--violet-dim);
            border: 1px solid rgba(124,110,247,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .transcript-icon svg { width: 16px; height: 16px; stroke: var(--accent-2); fill: none; }
        .transcript-label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
        .transcript-text { font-size: 0.9rem; color: var(--text-2); font-style: italic; line-height: 1.6; }

        /* Coach card */
        .coach-header {
            display: flex; align-items: center; gap: 10px;
            padding: 16px 20px 0;
            margin-bottom: 12px;
        }
        .coach-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--violet-dim);
            border: 1px solid rgba(124,110,247,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .coach-avatar svg { width: 18px; height: 18px; fill: var(--accent-2); }
        .coach-name { font-size: 0.9rem; font-weight: 600; color: var(--accent-2); }
        .coach-tag { font-size: 0.7rem; color: var(--text-3); }
        .coach-body { padding: 0 20px 20px; }
        .coach-body p { font-size: 0.88rem; color: var(--text-2); line-height: 1.65; }
        .coach-body strong { color: var(--accent-2); font-weight: 600; }
        .coach-suggestion-item {
            display: flex; align-items: flex-start;
            gap: 10px; margin-top: 12px;
        }
        .coach-check {
            flex-shrink: 0; margin-top: 2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--teal-dim);
            border: 1px solid rgba(45,212,191,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .coach-check svg { width: 10px; height: 10px; stroke: var(--teal); fill: none; }

        .play-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--violet-dim);
            border: 1px solid rgba(124,110,247,0.3);
            border-radius: 40px;
            padding: 10px 18px;
            color: var(--accent-2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: fit-content;
            margin-top: 14px;
        }
        .play-btn:hover { background: rgba(124,110,247,0.25); }
        .play-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* ─── ERROR ─── */
        .error-card {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.25);
            border-radius: var(--r);
            padding: 20px;
        }
        .error-card p:first-child { font-weight: 600; color: var(--red); margin-bottom: 6px; }
        .error-card p:last-child { font-size: 0.85rem; color: rgba(248,113,113,0.7); }

        /* ─── TOAST ─── */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 0.82rem;
            color: var(--text-2);
            backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ─── UTIL ─── */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 16px; }
        .mt-2 { margin-top: 8px; }
        .w-full { width: 100%; }
    </style>
</head>
<body>

<div class="bg-canvas">

    <!-- MAIN -->
    <main id="main">

<template id="tpl-1"><!-- Sensor -->
    <div class="card">

                <div class="sensor-tile">
                    <div class="label">Acc Y</div>

                    <span>Tap to open camera</span>

    <div class="card">

            <button id="record-btn" class="mic-btn">
                <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"/></svg>

    <div class="card">
        <div class="card-body" style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px 20px;">
            <div class="reveal-wrap">

<template id="tpl-6"><!-- Analyzing -->
    <div class="card">
        <div class="card-body" style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px;">
            <div class="breathe-wrap">
                <div class="breathe-ring"></div>
                <div class="breathe-ring"></div>
                <div class="breathe-ring"></div>
                <div id="breath-text" class="breathe-text">Breathe in…</div>
            </div>
            <p style="font-size:0.8rem;color:var(--text-3);text-align:center;">Analysing your check-in</p>
        </div>
    </div>
</template>


<script>
// ── CONFIG ──
const SERVER_URL = "https://rudraverma7-SafeSpace.hf.space/analyze";
const ESP32_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const ESP32_CHAR_UUID    = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

// ── STATE ──
let currentStep = 0;
let esp32Device = null;
let latestPhysioData = "{}";
let imageBlob = null;
let audioBlob = null;
let mediaRecorder, audioChunks = [];
let currentDassQ = 0;
const dassAnswers = new Array(21).fill(null);

const dassQuestions = [
    "I found it hard to wind down",
    "I was aware of dryness of my mouth",
    "I couldn't seem to experience any positive feeling at all",
    "I experienced breathing difficulty",
    "I found it difficult to work up the initiative to do things",
    "I tended to over-react to situations",
    "I experienced trembling",
    "I felt that I was using a lot of nervous energy",
    "I was worried about situations in which I might panic",
    "I felt that I had nothing to look forward to",
    "I found myself getting agitated",
    "I found it difficult to relax",
    "I felt down-hearted and blue",
    "I was intolerant of anything that kept me from getting on with what I was doing",
    "I felt I was close to panic",
    "I was unable to become enthusiastic about anything",
    "I felt I wasn't worth much as a person",
    "I felt that I was rather touchy",
    "I was aware of the action of my heart in the absence of physical exertion",
    "I felt scared without any good reason",
    "I felt that life was meaningless"
];

const stepInstructions = [
    "",
    "Let's start by connecting your bio-sensor. This is entirely optional.",
    "Take a gentle breath, relax your face, and tap below to capture your expression.",
    "Tap the microphone and share freely — what's on your mind today?",
    "Over the past week, how much did each statement apply to you?",
    "All your data is ready and encrypted. Press and hold to reveal your insights.",
    "Thank you. Sit back and breathe while we process your insights…",
    ""
];

const stepIcons = ['👋','📡','📸','🎤','🤔','✨','🧘','📊'];
const TOTAL_STEPS = 6; // 1-6

// ── DOM ──
const topBar    = document.getElementById('top-bar');
const stepper   = document.getElementById('stepper');
const scrWelcome= document.getElementById('screen-welcome');
const scrStep   = document.getElementById('screen-step');
const scrReport = document.getElementById('screen-report');
const bubbleText= document.getElementById('bubble-text');
const contentArea=document.getElementById('content-area');
const reportContent=document.getElementById('report-content');

// ── SHOW SCREEN ──
function showStep(idx) {
    currentStep = idx;
    [scrWelcome, scrStep, scrReport].forEach(s => s.classList.remove('active'));

    if (idx === 0) {
        scrWelcome.classList.add('active');
        topBar.classList.remove('visible');
        return;
    }
    if (idx === 7) {
        scrReport.classList.add('active');
        topBar.classList.remove('visible');
        return;
    }

    topBar.classList.add('visible');
    updateStepper(idx);
    bubbleText.textContent = stepInstructions[idx];
    contentArea.innerHTML = '';

    const tpl = document.getElementById(`tpl-${idx}`);
    if (tpl) contentArea.appendChild(tpl.content.cloneNode(true));

    const setups = {1:setupSensor,2:setupPhoto,3:setupAudio,4:setupDass,5:setupReveal,6:setupAnalyze};
    if (setups[idx]) setups[idx]();

    scrStep.classList.add('active');
}

function updateStepper(cur) {
    stepper.innerHTML = '';
    for (let i = 1; i <= TOTAL_STEPS; i++) {
        const d = document.createElement('div');
        d.className = 'step-dot' + (i < cur ? ' done' : i === cur ? ' current' : '');
        stepper.appendChild(d);
    }
}

// ── TOAST ──
function toast(msg, dur=2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
}

// ── STEP 1: SENSOR ──
function setupSensor() {
    contentArea.querySelector('#connect-btn').addEventListener('click', handleBleConnect);
    contentArea.querySelector('#skip-sensor-btn').addEventListener('click', () => {
        if (esp32Device?.gatt.connected) esp32Device.gatt.disconnect();
        esp32Device = null;
        showStep(2);
    });
}

async function handleBleConnect() {
    const btn = contentArea.querySelector('#connect-btn');
    const status = contentArea.querySelector('#sensor-status');
    if (!navigator.bluetooth) { status.textContent = "Web Bluetooth not available here."; return; }
    try {
        btn.textContent = "Searching…"; btn.disabled = true;
        status.textContent = "Select your SafeSpace sensor…"; status.style.color = 'var(--teal)';
        esp32Device = await navigator.bluetooth.requestDevice({
            filters: [{ name:'SafeSpace_Device' }, { services:[ESP32_SERVICE_UUID] }],
            optionalServices: [ESP32_SERVICE_UUID]
        });
        status.textContent = "Connecting…";
        const server = await esp32Device.gatt.connect();
        const svc    = await server.getPrimaryService(ESP32_SERVICE_UUID);
        const char   = await svc.getCharacteristic(ESP32_CHAR_UUID);
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', ev => {
            const dec = new TextDecoder('utf-8');
            latestPhysioData = dec.decode(ev.target.value);
            try { updateSensorUI(JSON.parse(latestPhysioData)); } catch(e){}
        });
        esp32Device.addEventListener('gattserverdisconnected', () => {
            toast('Sensor disconnected');
            esp32Device = null;
            contentArea.querySelector('#ble-data-container')?.classList.add('hidden');
            btn.style.display='block'; btn.disabled=false; btn.textContent='Search for Sensor';
        });
        btn.style.display = 'none';
        status.innerHTML = `✅ Connected to <strong>${esp32Device.name}</strong>`;
        contentArea.querySelector('#ble-data-container').classList.remove('hidden');
        contentArea.querySelector('#skip-sensor-btn').textContent = "Continue →";
    } catch(e) {
        status.textContent = 'Connection failed. Please try again.'; status.style.color = 'var(--red)';
        btn.disabled = false; btn.textContent = 'Search for Sensor';
    }
}

function updateSensorUI(d) {
    const $ = id => document.getElementById(id);
    $('value-eda').textContent  = d.eda_uS?.toFixed(2)  ?? '--';
    $('value-hrv').textContent  = d.hrv_rmssd?.toFixed(2)?? '--';
    $('value-temp').textContent = d.temp_c?.toFixed(1)  ?? '--';
    $('value-acc-x').textContent= d.acc_x_g?.toFixed(2) ?? '--';
    $('value-acc-y').textContent= d.acc_y_g?.toFixed(2) ?? '--';
    $('value-acc-z').textContent= d.acc_z_g?.toFixed(2) ?? '--';
}

// ── STEP 2: PHOTO ──
function setupPhoto() {
    const container = contentArea.querySelector('#photo-container');
    const video     = contentArea.querySelector('#video-preview');
    const status    = contentArea.querySelector('#photo-status');

    container.addEventListener('click', async () => {
        if (imageBlob) return;
        if (container.classList.contains('streaming')) {
            // Capture
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                imageBlob = blob;
                status.textContent = '✅ Photo captured';
                video.srcObject?.getTracks().forEach(t => t.stop());
                container.classList.remove('streaming');
                container.style.backgroundImage = `url(${URL.createObjectURL(blob)})`;
                container.style.backgroundSize = 'cover';
                container.style.backgroundPosition = 'center';
                container.querySelector('.camera-placeholder').style.display='none';
                setTimeout(() => showStep(3), 1400);
            }, 'image/jpeg');
            return;
        }
        try {
            status.textContent = 'Starting camera…';
            const stream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'user'}, audio:false });
            video.srcObject = stream; video.play();
            container.classList.add('streaming');
            status.textContent = 'Tap again to capture';
        } catch(e) { status.textContent = `Camera error: ${e.message}`; status.style.color='var(--red)'; }
    });
}

// ── STEP 3: AUDIO ──
function setupAudio() {
    const btn    = contentArea.querySelector('#record-btn');
    const status = contentArea.querySelector('#record-status');

    btn.addEventListener('click', async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                status.textContent = 'Getting microphone…';
                const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type:'audio/wav' });
                    status.textContent = '✅ Audio recorded';
                    stream.getTracks().forEach(t => t.stop());
                    btn.classList.remove('recording');
                    setTimeout(() => showStep(4), 1400);
                };
                mediaRecorder.start();
                status.textContent = 'Recording… tap to stop';
                btn.classList.add('recording');
            } catch(e) { status.textContent = `Mic error: ${e.message}`; status.style.color='var(--red)'; }
        } else {
            mediaRecorder.stop();
        }
    });
}

// ── STEP 4: DASS ──
function setupDass() {
    renderDassQ();

    contentArea.querySelector('#dass-prev').onclick = () => {
        if (currentDassQ > 0) { currentDassQ--; renderDassQ(); }
    };
    contentArea.querySelector('#dass-next').onclick = () => {
        if (currentDassQ < dassQuestions.length - 1) { currentDassQ++; renderDassQ(); }
    };
    contentArea.querySelector('#dass-submit').onclick = () => showStep(5);
}

function renderDassQ() {
    const q     = contentArea.querySelector('#dass-question');
    const opts  = contentArea.querySelector('#dass-options');
    const fill  = contentArea.querySelector('#dass-progress-fill');
    const ctr   = contentArea.querySelector('#dass-counter');
    const prev  = contentArea.querySelector('#dass-prev');
    const next  = contentArea.querySelector('#dass-next');
    const sub   = contentArea.querySelector('#dass-submit');

    q.textContent = dassQuestions[currentDassQ];
    ctr.textContent = currentDassQ + 1;
    fill.style.width = `${((currentDassQ + 1) / dassQuestions.length) * 100}%`;
    prev.disabled = currentDassQ === 0;
    const isLast = currentDassQ === dassQuestions.length - 1;
    next.classList.toggle('hidden', isLast);
    sub.classList.toggle('hidden', !isLast);

    const labels = ['Not at all', 'Sometimes', 'Often', 'Almost always'];
    opts.innerHTML = labels.map((l, i) => `
        <button class="dass-opt${dassAnswers[currentDassQ] === i ? ' selected' : ''}" data-v="${i}">${l}</button>
    `).join('');
    opts.querySelectorAll('.dass-opt').forEach(b => {
        b.onclick = () => {
            dassAnswers[currentDassQ] = parseInt(b.dataset.v);
            renderDassQ();
            if (currentDassQ < dassQuestions.length - 1) {
                setTimeout(() => { currentDassQ++; renderDassQ(); }, 240);
            }
        };
    });
}

// ── STEP 5: REVEAL ──
function setupReveal() {
    const btn    = contentArea.querySelector('#reveal-btn');
    const arc    = contentArea.querySelector('#reveal-arc');
    const status = contentArea.querySelector('#reveal-status');
    const total  = 1500;
    let progress = 0, iv, to;

    const start = () => {
        progress = 0;
        status.textContent = 'Hold to confirm…';
        iv = setInterval(() => {
            progress += 20;
            const offset = 276.5 * (1 - Math.min(progress, total) / total);
            arc.style.strokeDashoffset = offset;
            if (progress >= total) { clearInterval(iv); showStep(6); }
        }, 20);
    };
    const cancel = () => {
        clearInterval(iv); clearTimeout(to);
        arc.style.strokeDashoffset = 276.5;
        status.textContent = '';
    };

    btn.addEventListener('mousedown', start);
    btn.addEventListener('mouseup', cancel);
    btn.addEventListener('mouseleave', cancel);
    btn.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
    btn.addEventListener('touchend', cancel);
}

// ── STEP 6: ANALYZE ──
async function setupAnalyze() {
    const txt = contentArea.querySelector('#breath-text');
    const breathInterval = setInterval(() => {
        txt.style.opacity = 0;
        setTimeout(() => {
            txt.textContent = txt.textContent.includes('in') ? 'Breathe out…' : 'Breathe in…';
            txt.style.opacity = 1;
        }, 700);
    }, 4000);

    if (!esp32Device) latestPhysioData = JSON.stringify({eda_uS:0,hrv_rmssd:0,temp_c:0,acc_x_g:0,acc_y_g:0,acc_z_g:0});

    const form = new FormData();
    form.append('image_file', imageBlob, 'photo.jpg');
    form.append('audio_file', audioBlob, 'audio.wav');
    form.append('dass_data', JSON.stringify({ responses: dassAnswers.map(a => a ?? 0) }));
    form.append('physio_data', latestPhysioData);

    try {
        const res = await fetch(SERVER_URL, { method:'POST', body:form });
        if (!res.ok) throw new Error(`Server ${res.status}`);
        const data = await res.json();
        populateReport(data);
    } catch(e) {
        populateReport({ error: e.message });
    } finally {
        clearInterval(breathInterval);
        showStep(7);
    }
}

// ── REPORT ──
function populateReport(result) {
    if (result.error) {
        reportContent.innerHTML = `
            <div class="error-card">
                <p>Analysis error</p>
                <p>${result.error}</p>
            </div>`;
        return;
    }

    const score = result.stress_score_percent ?? 0;
    const circ  = 2 * Math.PI * 44;
    const offset= circ - (score / 100) * circ;
    const isHigh= score >= 50;
    const gaugeColor = isHigh ? '#f87171' : '#34d399';

    // Audio
    let audioBtn = '';
    if (result.coach_audio_b64) {
        window._coachAudio = new Audio("data:audio/mp3;base64," + result.coach_audio_b64);
        audioBtn = `<button class="play-btn" onclick="window._coachAudio.play()">
            <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
            Play Coach Message
        </button>`;
        window._coachAudio.play().catch(()=>{});
    }

    const coachHtml = parseLLM(result.llm_suggestion);

    reportContent.innerHTML = `
        <div class="card gauge-card">
            <div class="gauge-wrap">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="44" stroke="rgba(120,160,255,0.1)" stroke-width="6" fill="none"/>
                    <circle id="report-gauge" cx="50" cy="50" r="44"
                        stroke="${gaugeColor}" stroke-width="6" fill="none"
                        stroke-linecap="round"
                        stroke-dasharray="${circ}"
                        stroke-dashoffset="${circ}"
                        transform="rotate(-90 50 50)"
                        style="transition:stroke-dashoffset 1.2s cubic-bezier(0.25,1,0.5,1);"/>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-score" style="color:${gaugeColor}">${score}<span style="font-size:1rem">%</span></div>
                    <div class="gauge-label" style="color:${gaugeColor}">${result.stress_level ?? ''}</div>
                </div>
            </div>
            <p class="gauge-title">Stress Score</p>
        </div>

        ${result.transcribed_text ? `
        <div class="card transcript-card">
            <div class="card-body">
                <div class="transcript-icon">
                    <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5"/></svg>
                </div>
                <div>
                    <div class="transcript-label">What you said</div>
                    <div class="transcript-text">"${result.transcribed_text}"</div>
                </div>
            </div>
        </div>` : ''}

        <div class="card">
            <div class="coach-header">
                <div class="coach-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                </div>
                <div>
                    <div class="coach-name">Your AI Coach</div>
                    <div class="coach-tag">Personalised guidance</div>
                </div>
            </div>
            <div class="coach-body">${coachHtml}${audioBtn}</div>
        </div>
    `;

    // Animate gauge
    requestAnimationFrame(() => setTimeout(() => {
        const g = document.getElementById('report-gauge');
        if (g) g.style.strokeDashoffset = offset;
    }, 80));
}

function parseLLM(text) {
    if (!text) return '';
    let html = '', inList = false;
    text.split('\n').filter(l => l.trim()).forEach(line => {
        const bold = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        if (line.match(/^\s*(\d+\.|\*|-)\s+/)) {
            if (!inList) { html += '<div style="margin-top:12px;display:flex;flex-direction:column;gap:10px;">'; inList = true; }
            html += `<div class="coach-suggestion-item">
                <div class="coach-check"><svg viewBox="0 0 12 12" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg></div>
                <p>${bold.replace(/^\s*(\d+\.|\*|-)\s+/, '')}</p>
            </div>`;
        } else {
            if (inList) { html += '</div>'; inList = false; }
            html += `<p style="margin-top:6px;">${bold}</p>`;
        }
    });
    if (inList) html += '</div>';
    return html;
}

// ── INIT ──
document.getElementById('start-btn').addEventListener('click', () => showStep(1));
document.getElementById('retake-btn').addEventListener('click', () => {
    speechSynthesis?.cancel();
    if (esp32Device?.gatt.connected) esp32Device.gatt.disconnect();
    currentStep=0; esp32Device=null; latestPhysioData='{}';
    imageBlob=null; audioBlob=null; mediaRecorder=null; audioChunks=[];
    dassAnswers.fill(null); currentDassQ=0;
    reportContent.innerHTML='';
    showStep(0);
});

// Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js').catch(()=>{}));
}
const CACHE_NAME = 'safe-space-cache-v3';

const urlsToCache = [
  '/',
  '/index.html',
  '/manifest.json',
  '/service-worker.js',
  '/icon/icon-192.png',
  '/icon/icon-512.png'
];

self.addEventListener('install', event => {
  event.waitUntil(
    caches.open(CACHE_NAME)
      .then(cache => cache.addAll(urlsToCache))
  );
});

self.addEventListener('fetch', event => {
  event.respondWith(
    caches.match(event.request)
      .then(response => response || fetch(event.request))
  );
});

self.addEventListener('activate', event => {
  const cacheWhitelist = [CACHE_NAME];
  event.waitUntil(
    caches.keys().then(cacheNames =>
      Promise.all(
        cacheNames.map(cacheName => {
          if (!cacheWhitelist.includes(cacheName)) {
            return caches.delete(cacheName);
          }
        })
      )
    )
  );
});
</script>
